<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </radialGradient>
    <radialGradient id="vortex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="60%" stop-color="#6D28D9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Vortex rings -->
  <circle cx="100" cy="100" r="70" stroke="#7C3AED" stroke-width="1" opacity="0.3" fill="none" stroke-dasharray="8 4"/>
  <circle cx="100" cy="100" r="55" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4" fill="none" stroke-dasharray="6 3"/>
  <circle cx="100" cy="100" r="40" stroke="#A78BFA" stroke-width="2" opacity="0.5" fill="none" stroke-dasharray="4 3"/>
  <circle cx="100" cy="100" r="26" stroke="#C4B5FD" stroke-width="2.5" opacity="0.6" fill="none"/>
  <!-- Black hole center -->
  <circle cx="100" cy="100" r="18" fill="#09090B"/>
  <circle cx="100" cy="100" r="14" fill="#09090B"/>
  <circle cx="100" cy="100" r="10" fill="url(#vortex)"/>
  <circle cx="100" cy="100" r="6" fill="#3B0764"/>
  <text x="100" y="178" font-family="system-ui" font-size="18" font-weight="700" fill="#A78BFA" text-anchor="middle" letter-spacing="3">VOID</text>
</svg>
