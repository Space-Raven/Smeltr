<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Electron orbits -->
  <ellipse cx="100" cy="100" rx="65" ry="25" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="65" ry="25" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="100" rx="65" ry="25" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(120 100 100)"/>
  <!-- Nucleus -->
  <circle cx="100" cy="100" r="14" fill="#0284C7"/>
  <circle cx="100" cy="100" r="10" fill="#38BDF8"/>
  <circle cx="96" cy="96" r="4" fill="#BAE6FD" opacity="0.8"/>
  <!-- Electrons -->
  <circle cx="165" cy="100" r="5" fill="#0EA5E9"/>
  <circle cx="68" cy="78" r="5" fill="#0EA5E9" transform="rotate(60 100 100)"/>
  <circle cx="68" cy="78" r="5" fill="#38BDF8" transform="rotate(120 100 100)"/>
  <text x="100" y="178" font-family="system-ui" font-size="18" font-weight="700" fill="#0284C7" text-anchor="middle" letter-spacing="2">ATOM</text>
</svg>
