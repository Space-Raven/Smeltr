  <circle cx="100" cy="97" r="48" fill="#FEF08A"/>
  <!-- Segment lines -->
  <line x1="100" y1="49" x2="100" y2="97" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="97" x2="141" y2="122" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="97" x2="59" y2="122" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="97" x2="152" y2="74" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="97" x2="48" y2="74" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="97" x2="141" y2="72" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="97" x2="59" y2="72" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
