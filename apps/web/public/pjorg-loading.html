/* ── Animation 1: Coin Toss (3s) ── */

  80%,86%{transform:translate(-53px,2px) rotate(670deg);opacity:1}
  88%,94%{opacity:0}96%,100%{transform:translate(0,0) rotate(0deg);opacity:1}}
@keyframes ra{0%,5%{transform:rotate(0deg)}19%{transform:rotate(-50deg)}34%,100%{transform:rotate(0deg)}}

@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%,94%{transform:scaleY(.07)}}

/* ── Animation 2: Bellows Pump (1.8s) ── */

@keyframes bg2{0%,100%{opacity:.12}40%,54%{opacity:.52}}
@keyframes bf{0%,100%{transform:scaleY(.85) translateY(2px);opacity:.5}
  40%,54%{transform:scaleY(1.55) translateY(-6px);opacity:.95}}
@keyframes bb{0%,100%{transform:translateY(0)}40%,54%{transform:translateY(2px)}}

/* ── Animation 3: Tome Reading (3.2s) ── */

@keyframes tp{0%,24%{transform:skewX(0deg) scaleX(1)}
