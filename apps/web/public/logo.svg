<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44" fill="none" role="img" aria-label="Minty">
  <defs>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>
  <!-- Coin body -->
  <circle cx="22" cy="26" r="16" fill="url(#coin)"/>
  <circle cx="22" cy="26" r="12" fill="none" stroke="#818CF8" stroke-width="1.5" opacity="0.5"/>
  <!-- Dollar/token symbol -->
  <text x="22" y="31" font-family="system-ui" font-size="12" font-weight="700" fill="#C7D2FE" text-anchor="middle">T</text>
  <!-- Mint leaf sprouting from coin -->
  <path d="M22 10 C22 10 14 4 14 10 C14 15 22 14 22 14 C22 14 30 15 30 10 C30 4 22 10 22 10z" fill="url(#leaf)"/>
  <line x1="22" y1="10" x2="22" y2="16" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="46" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#1E1B4B">Minty</text>
</svg>
