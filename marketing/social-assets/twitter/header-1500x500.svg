<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="coinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </radialGradient>
    <filter id="leafShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect width="1500" height="500" fill="url(#glow2)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1500" height="500" fill="url(#dots)"/>
  </g>

  <!-- Decorative circles (right side) -->
  <circle cx="1150" cy="250" r="280" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.15"/>
  <circle cx="1150" cy="250" r="220" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.12"/>
  <circle cx="1150" cy="250" r="160" fill="none" stroke="#818CF8" stroke-width="1" opacity="0.1"/>

  <!-- LEFT SIDE: Logo + Wordmark -->
  <!-- Coin -->
  <ellipse cx="118" cy="268" rx="55" ry="7" fill="#312E81" opacity="0.5"/>
  <circle cx="118" cy="261" r="57" fill="url(#coinGrad)"/>
  <circle cx="118" cy="261" r="57" fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.5"/>
  <circle cx="118" cy="261" r="46" fill="none" stroke="#A5B4FC" stroke-width="0.5" opacity="0.3"/>
  <!-- Leaf on coin -->
  <path d="M118 227 C118 227 116 242 115 252" stroke="#34D399" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M115 252 C108 244 98 234 100 223 C102 213 111 210 116 219 C116 219 115 232 115 252" fill="#10B981"/>
  <path d="M115 252 C122 241 134 230 131 220 C128 210 117 209 115 220 C115 220 115 232 115 252" fill="#059669"/>
  <path d="M117 227 C112 220 105 217 103 222 C101 227 108 230 117 227" fill="#34D399" opacity="0.9"/>
  <path d="M118 225 C123 218 130 216 131 222 C132 228 125 230 118 225" fill="#10B981" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="195" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="2">minty</text>
  <circle cx="480" cy="228" r="6" fill="#6366F1"/>

  <!-- Tagline -->
  <text x="195" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#A5B4FC" letter-spacing="1">Non-Custodial Token-2022 Launcher on Solana</text>

  <!-- Divider -->
  <line x1="195" y1="310" x2="550" y2="310" stroke="#4338CA" stroke-width="1.5"/>

  <!-- Feature pills -->
  <!-- Transfer Fee -->
  <rect x="195" y="328" width="150" height="34" rx="17" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
  <circle cx="216" cy="345" r="8" fill="#6366F1" opacity="0.6"/>
  <text x="232" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#C7D2FE">Transfer Fee</text>

  <!-- Non-Transferable -->
  <rect x="355" y="328" width="172" height="34" rx="17" fill="#312E81" stroke="#F97316" stroke-width="1"/>
  <circle cx="376" cy="345" r="8" fill="#F97316" opacity="0.6"/>
  <text x="392" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#FED7AA">Non-Transferable</text>

  <!-- Perm Delegate -->
  <rect x="537" y="328" width="168" height="34" rx="17" fill="#312E81" stroke="#EF4444" stroke-width="1"/>
  <circle cx="558" cy="345" r="8" fill="#EF4444" opacity="0.6"/>
  <text x="574" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#FECACA">Perm. Delegate</text>

  <!-- RIGHT SIDE: 3 Feature cards -->
  <!-- Card 1 -->
  <rect x="760" y="80" width="220" height="340" rx="16" fill="#1E1B4B" stroke="#4338CA" stroke-width="1.5"/>
  <rect x="760" y="80" width="220" height="5" rx="2" fill="#6366F1"/>
  <!-- Icon area -->
  <circle cx="870" cy="175" r="45" fill="#312E81"/>
  <text x="870" y="190" text-anchor="middle" font-family="serif" font-size="40" fill="#818CF8">%</text>
  <text x="870" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="white">Transfer Fee</text>
  <text x="870" y="272" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">Earn on every</text>
  <text x="870" y="289" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">transaction</text>
  <!-- Basis points -->
  <rect x="810" y="338" width="120" height="58" rx="8" fill="#312E81"/>
  <text x="870" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6366F1" letter-spacing="1">UP TO</text>
  <text x="870" y="384" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white">100%</text>

  <!-- Card 2 -->
  <rect x="1010" y="80" width="220" height="340" rx="16" fill="#1E1B4B" stroke="#4338CA" stroke-width="1.5"/>
  <rect x="1010" y="80" width="220" height="5" rx="2" fill="#F97316"/>
  <circle cx="1120" cy="175" r="45" fill="#312E81"/>
  <!-- Shield icon simplified -->
  <path d="M1120 148 L1140 156 L1140 172 C1140 183 1131 192 1120 196 C1109 192 1100 183 1100 172 L1100 156 Z" fill="#F97316" opacity="0.7"/>
  <rect x="1116" y="163" width="8" height="12" rx="2" fill="white"/>
  <circle cx="1120" cy="162" r="4" fill="none" stroke="white" stroke-width="2"/>
  <text x="1120" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="white">Non-Transferable</text>
  <text x="1120" y="272" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">Soul-bound tokens</text>
  <text x="1120" y="289" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">for credentials</text>
  <rect x="1060" y="338" width="120" height="58" rx="8" fill="#312E81"/>
  <text x="1120" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#F97316" letter-spacing="1">LOCKED</text>
  <text x="1120" y="384" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white">Forever</text>

  <!-- Card 3 -->
  <rect x="1260" y="80" width="220" height="340" rx="16" fill="#1E1B4B" stroke="#4338CA" stroke-width="1.5"/>
  <rect x="1260" y="80" width="220" height="5" rx="2" fill="#EF4444"/>
  <circle cx="1370" cy="175" r="45" fill="#312E81"/>
  <!-- Crown simplified -->
  <path d="M1350 185 L1355 165 L1365 178 L1370 160 L1375 178 L1385 165 L1390 185 Z" fill="#EF4444" opacity="0.8"/>
  <rect x="1350" y="185" width="40" height="8" rx="2" fill="#EF4444" opacity="0.6"/>
  <text x="1370" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="white">Perm. Delegate</text>
  <text x="1370" y="272" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">Platform-level</text>
  <text x="1370" y="289" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">token control</text>
  <rect x="1310" y="338" width="120" height="58" rx="8" fill="#312E81"/>
  <text x="1370" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#EF4444" letter-spacing="1">FULL</text>
  <text x="1370" y="384" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white">Control</text>

  <!-- Bottom strip -->
  <rect x="0" y="470" width="1500" height="30" fill="#312E81" opacity="0.5"/>
  <text x="750" y="491" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#818CF8" letter-spacing="2">minty.app  —  NON-CUSTODIAL  •  NO SIGN-UP  •  YOUR KEYS, YOUR TOKENS</text>
</svg>
