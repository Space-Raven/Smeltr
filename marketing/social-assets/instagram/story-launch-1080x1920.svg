  <path d="M532 392 C550 368 575 342 568 317 C561 292 538 288 534 312 C534 312 532 350 532 392" fill="#059669"/>
  <path d="M536 342 C524 326 505 319 501 330 C497 341 512 350 536 342" fill="#34D399" opacity="0.9"/>
  <path d="M540 336 C552 320 571 314 574 326 C577 338 562 346 540 336" fill="#10B981" opacity="0.9"/>

