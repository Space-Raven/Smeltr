  <line x1="0" y1="730" x2="1080" y2="730" stroke="#4338CA" stroke-width="1.5"/>

  <text x="540" y="800" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="white">Your token. Your brand.</text>
  <text x="540" y="845" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#94A3B8">Upload your own icon or use our test gallery.</text>
  <text x="540" y="887" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#94A3B8">Stored permanently on Arweave.</text>

  <rect x="315" y="915" width="450" height="64" rx="32" fill="#6366F1"/>
  <text x="540" y="955" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="white">Deploy at minty.app</text>

  <text x="540" y="1046" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#4338CA" letter-spacing="2">@mintyapp  •  #Solana  #NFT  #Token2022</text>
