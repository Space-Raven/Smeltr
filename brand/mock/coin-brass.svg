<?xml version="1.0" encoding="UTF-8"?>
<!-- MOCK brass coin - S path from brand/source/master/s-mark-filled.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Smeltr brass coin">
  <defs>
    <radialGradient id="coinFace" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#F5E6A8"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="72%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#7C5E10"/>
    </radialGradient>
    <linearGradient id="coinRim" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#5C4A0E"/>
    </linearGradient>
    <filter id="hammered" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="coinClip">
      <circle cx="256" cy="256" r="218"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" fill="#0F0A06"/>
  <g filter="url(#coinShadow)">
    <circle cx="256" cy="256" r="232" fill="url(#coinRim)"/>
    <circle cx="256" cy="256" r="218" fill="url(#coinFace)" filter="url(#hammered)"/>
    <circle cx="256" cy="256" r="218" fill="none" stroke="#5C4A0E" stroke-width="2" opacity="0.55"/>
    <circle cx="256" cy="256" r="198" fill="none" stroke="#F5E6A8" stroke-width="1.5" opacity="0.35"/>
    <g clip-path="url(#coinClip)">
      <g transform="translate(256 264) scale(2.85) translate(-50 -50)" opacity="0.45">
        <path d="M 35 10 L 65 10 L 65 30 L 50 45 L 65 60 L 65 80 L 35 80 L 35 60 L 50 45 L 35 30 Z" fill="none" stroke="#5C4A0E" stroke-width="2.8" stroke-linejoin="miter"/>
      </g>
      <g transform="translate(254 246) scale(2.85) translate(-50 -50)">
        <path d="M 35 10 L 65 10 L 65 30 L 50 45 L 65 60 L 65 80 L 35 80 L 35 60 L 50 45 L 35 30 Z" fill="none" stroke="#FFF8DC" stroke-width="2.2" stroke-linejoin="miter"/>
        <path d="M 35 10 L 65 10 L 65 30 L 50 45 L 65 60 L 65 80 L 35 80 L 35 60 L 50 45 L 35 30 Z" fill="none" stroke="#B8860B" stroke-width="1" stroke-linejoin="miter"/>
      </g>
    </g>
  </g>
</svg>
