<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0C05"/>
      <stop offset="55%" stop-color="#2D1507"/>
      <stop offset="100%" stop-color="#3D1F08"/>
    </linearGradient>
    <linearGradient id="sFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <pattern id="ribs" width="1200" height="8" patternUnits="userSpaceOnUse">
      <rect width="1200" height="4" fill="#92400E" opacity="0.45"/>
      <rect y="4" width="1200" height="4" fill="transparent"/>
    </pattern>
    <clipPath id="sClip">
      <path d="M 118 165 L 382 165 L 382 255 L 250 315 L 382 375 L 382 465 L 118 465 L 118 375 L 250 315 L 118 255 Z"/>
    </clipPath>
    <filter id="spark" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#F59E0B" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#F59E0B" stroke-width="0.5" opacity="0.1"/>

  <!-- Large geometric S (sketch reference) -->
  <g clip-path="url(#sClip)">
    <rect x="100" y="150" width="300" height="330" fill="url(#sFill)"/>
    <rect x="100" y="150" width="300" height="330" fill="url(#ribs)"/>
  </g>
  <circle cx="400" cy="175" r="11" fill="#FDE68A" filter="url(#spark)"/>
  <circle cx="428" cy="155" r="7" fill="#FBBF24" filter="url(#spark)"/>

  <!-- Wordmark block -->
  <text x="480" y="280" font-family="system-ui,sans-serif" font-size="96" font-weight="800" fill="#FEF3C7" letter-spacing="-2">Smeltr</text>
  <text x="482" y="340" font-family="system-ui,sans-serif" font-size="28" fill="#D97706">Non-custodial Token-2022 infrastructure</text>
  <text x="482" y="390" font-family="system-ui,sans-serif" font-size="22" fill="#B45309">Deploy · Validate · MCP for AI assistants</text>
  <text x="482" y="560" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#F59E0B">smeltr.org</text>
</svg>
