name: Secret scan

# Remediation for Audit-1 TOB-02 (committed live secret). Fails the build if any
# secret is present in the working tree. Pinned gitleaks version + binary install
# avoids the gitleaks-action org-license requirement.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Filesystem scan of the current tree (no node_modules present in this job,
      # so the scan is fast and free of dependency false positives). This catches
      # secrets in the CURRENT state of any file; it does not rewrite history.
      - name: Scan working tree for secrets
        run: gitleaks detect --no-git --source . --redact --exit-code 1 --config .gitleaks.toml --report-path gitleaks-report.json

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
